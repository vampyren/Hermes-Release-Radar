name: Build public demo

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: public-pages-build
  cancel-in-progress: false

jobs:
  build-public-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Release Radar
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check out public Hermes Agent data
        run: |
          mkdir -p .cache
          git clone --filter=blob:none https://github.com/NousResearch/hermes-agent.git .cache/hermes-agent
          git -C .cache/hermes-agent fetch --tags --quiet
      - name: Generate public static artifacts
        run: python3 src/generate_public.py --hermes-repo .cache/hermes-agent --output public
      - name: Privacy scan public artifacts
        run: |
          if grep -R -n -E '/home/|~/.hermes/release-radar/state.json|review_markers|127\.0\.0\.1:8765/api|api/(status|refresh|markers)|hermes_repo' public; then
            echo 'Public artifact privacy scan failed.' >&2
            exit 1
          fi
      - name: Commit public artifacts when changed
        run: |
          if git diff --quiet -- public; then
            echo 'No public artifact changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/index.html public/snapshot.json
          git commit -m 'chore: rebuild public demo'
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload public demo artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
